- clean: ['~']

- defaults:
    link:
      create: true
      force: true

- create:
    - $DOTFILES_PATH/shell/bash/completions
    - $DOTFILES_PATH/shell/bash/themes

- link:
    ~/.bash_profile: shell/bash/.bash_profile
    ~/.bashrc: shell/bash/.bashrc
    ~/.zimrc: shell/zsh/.zimrc
    ~/.zlogin: shell/zsh/.zlogin
    ~/.zshenv: shell/zsh/.zshenv
    ~/.zshrc: shell/zsh/.zshrc
    ~/.inputrc: shell/.inputrc
    ~/.gitconfig: shell/.gitconfig
    ~/.claude/CLAUDE.md: tooling/claude/CLAUDE.md
    ~/.claude/commands: tooling/claude/commands
    ~/.claude/agents: tooling/claude/agents
    ~/.claude/skills: tooling/claude/skills
    ~/.claude/hooks: tooling/claude/hooks
    ~/.claude/keybindings.json: tooling/claude/keybindings.json
    ~/.claude/settings.json: tooling/claude/settings.json
    ~/.claude/statusline-command.sh: tooling/claude/statusline-command.sh
    ~/.claude/statusline-layouts: tooling/claude/statusline-layouts
    ~/.claude/statusline-themes: tooling/claude/statusline-themes
    ~/.config/opencode/opencode.json: tooling/opencode/opencode.json
    ~/.config/opencode/AGENTS.md: tooling/opencode/AGENTS.md
    ~/.config/opencode/commands: tooling/opencode/commands
    ~/.config/opencode/agents: tooling/opencode/agents
    ~/.config/opencode/plugin: tooling/opencode/plugin
    ~/.config/opencode/skill: tooling/opencode/skill
