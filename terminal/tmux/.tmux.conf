# =============================================================================
# tmux Configuration - Enhanced Navigation & Comfort
# =============================================================================

# Cambiar prefix a Ctrl+a (más cómodo que Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Recargar configuración con Ctrl+a + r
bind r source-file ~/.tmux.conf \; display "Configuración recargada!"

# =============================================================================
# Mejoras de Navegación
# =============================================================================

# Navegación estilo vim entre paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegación entre ventanas (estilo vim)
bind H previous-window
bind L next-window

# Dividir paneles (vim-style + intuitivos)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Cambiar entre paneles con Alt+flechas
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Redimensionar paneles con flechas (repetible con -r)
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5

# =============================================================================
# Configuración del Mouse
# =============================================================================

# Habilitar mouse para todo
set -g mouse on

# =============================================================================
# Mejoras Visuales y UI - Clean Style
# =============================================================================

# Colores base
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,ghostty:Tc"

# Mostrar título de sesión en tab de Ghostty
set -g set-titles on
set -g set-titles-string "#S — #W"

# Status bar config
set -g status-interval 5
set -g status-justify left
set -g status-position bottom

# Colores del tema (púrpura/violeta)
set -g status-style 'bg=#1a1b26,fg=#a9b1d6'

# Longitud de las secciones
set -g status-left-length 100
set -g status-right-length 100

# Status left - Sesión
set -g status-left '#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#a9b1d6,bg=#3b4261] #I:#P #[bg=#1a1b26] '

# Status right - Fecha y hora
set -g status-right '#[fg=#a9b1d6,bg=#3b4261] %d/%m/%y #[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M '

# Separador entre ventanas
set -g window-status-separator ' '

# Ventana activa
set -g window-status-current-format '#[fg=#1a1b26,bg=#bb9af7,bold] #I #W '

# Ventanas inactivas
set -g window-status-format '#[fg=#a9b1d6,bg=#3b4261] #I #W '

# Pane borders
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'fg=#1a1b26,bg=#7aa2f7,bold'
set -g message-command-style 'fg=#1a1b26,bg=#7aa2f7'

# Mode style (copy mode, etc)
set -g mode-style 'fg=#1a1b26,bg=#bb9af7,bold'

# Clock mode
set -g clock-mode-colour '#7aa2f7'

# =============================================================================
# Comportamiento y Utilidades
# =============================================================================

# No salir de tmux al cerrar una sesión (salta a otra)
set -g detach-on-destroy off

# Empezar numeración de ventanas y paneles desde 1
set -g base-index 1
set -g pane-base-index 1

# Renumerar ventanas automáticamente al cerrar
set -g renumber-windows on

# Renombrar ventanas automáticamente
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Matar pane (sin confirmación)
bind c kill-pane

# Crear ventana nueva
bind n new-window -c "#{pane_current_path}"

# Mejorar modo copia (estilo vim)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# Atajos útiles
bind Space last-window
bind Enter command-prompt "rename-window %%"
bind . command-prompt "move-window -t '%%'"

# =============================================================================
# Utilidades Adicionales
# =============================================================================

# Sincronizar paneles (toggle)
bind S setw synchronize-panes

# Intercambiar posición de paneles
bind x swap-pane -D

# Maximizar/minimizar paneles
bind m resize-pane -Z

# Mostrar información de paneles
bind i display-panes

# Limpiar historial del pane
bind K clear-history \; display "Historial limpio"

# =============================================================================
# Performance y Optimización
# =============================================================================

# Reducir delay de comandos (0 = sin lag para Claude Code)
set -s escape-time 0

# Aumentar historial (Claude Code genera ~4000 scroll events/seg)
set -g history-limit 250000

# Clipboard del sistema
set -g set-clipboard on

# Synchronized output - elimina flickering de Claude Code
set -g allow-passthrough on

# Teclas extendidas (Ctrl+Shift combos para Claude Code)
set -g extended-keys on

# Monitor de actividad (off para reducir redibujados)
setw -g monitor-activity off
set -g visual-activity off

# =============================================================================
# Atajos Anidados (para tmux dentro de tmux)
# =============================================================================

# Enviar prefix a sesión tmux anidada
bind a send-prefix

# =============================================================================
# Plugin Manager (TPM)
# =============================================================================

# Lista de plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# FZF URL config
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# SessionX config
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'

# Floax config
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Inicializar TPM (DEBE ir al final)
run '~/.tmux/plugins/tpm/tpm'
