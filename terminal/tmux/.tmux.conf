# =============================================================================
# tmux Configuration - Enhanced Navigation & Comfort
# =============================================================================

# Cambiar prefix a Ctrl+a (más cómodo que Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Recargar configuración con Ctrl+a + r
bind r source-file ~/.tmux.conf \; display "Configuración recargada!"

# =============================================================================
# Mejoras de Navegación
# =============================================================================

# Navegación estilo vim entre paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegación entre ventanas (estilo vim)
bind H previous-window
bind L next-window

# Dividir paneles (vim-style + intuitivos)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Cambiar entre paneles con Alt+flechas
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Redimensionar paneles con flechas (repetible con -r)
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5

# =============================================================================
# Configuración del Mouse
# =============================================================================

# Habilitar mouse para todo
set -g mouse on

# Salir de copy-mode al llegar al final del scroll
bind -n WheelDownPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" ""

# =============================================================================
# Mejoras Visuales y UI - Clean Style
# =============================================================================

# Colores base + anti-flicker
set -g default-terminal "tmux-256color"
set -as terminal-features ',ghostty:RGB:usstyle:sync:clipboard'
set -g focus-events on
set -g visual-bell off

# Mostrar título de sesión en tab de Ghostty
set -g set-titles on
set -g set-titles-string "#S — #W"

# Status bar config
set -g status-interval 10
set -g display-time 4000
set -g status-keys emacs
set -g status-justify left
set -g status-position bottom

# Colores del tema (púrpura/violeta)
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Longitud de las secciones
set -g status-left-length 100
set -g status-right-length 100

# Status left - Sesión
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold]   #S #[fg=#cdd6f4,bg=#313244] #I:#P #[bg=#1e1e2e] '

# Status right - Prefix indicator + Fecha y hora
set -g status-right '#{prefix_highlight} #[fg=#cdd6f4,bg=#313244] 󰃭 %d/%m #[fg=#1e1e2e,bg=#89b4fa,bold] 󰥔 %H:%M '

# Separador entre ventanas
set -g window-status-separator ' '

# Ventana activa
set -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7,bold]   #I #W '

# Ventanas inactivas
set -g window-status-format '#[fg=#cdd6f4,bg=#313244]   #I #W '

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Metadata por pane: número + directorio (sin git call para evitar fork spam)
set -g pane-border-status top
set -g pane-border-format "#[fg=#cdd6f4,bg=#313244] #P: #{b:pane_current_path} #[default]"

# Message style
set -g message-style 'fg=#1e1e2e,bg=#89b4fa,bold'
set -g message-command-style 'fg=#1e1e2e,bg=#89b4fa'

# Mode style (copy mode, etc)
set -g mode-style 'fg=#1e1e2e,bg=#cba6f7,bold'

# Clock mode
set -g clock-mode-colour '#89b4fa'

# =============================================================================
# Comportamiento y Utilidades
# =============================================================================

# No salir de tmux al cerrar una sesión (salta a otra)
set -g detach-on-destroy off

# Empezar numeración de ventanas y paneles desde 1
set -g base-index 1
set -g pane-base-index 1

# Renumerar ventanas automáticamente al cerrar
set -g renumber-windows on

# Renombrar ventanas automáticamente
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Matar pane (sin confirmación)
bind c kill-pane

# Crear ventana nueva
bind n new-window -c "#{pane_current_path}"

# Crear sesión nueva (pide nombre)
bind N command-prompt "new-session -s '%%'"

# Mejorar modo copia (estilo vim)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# Atajos útiles
bind Space last-window
bind Enter command-prompt "rename-window %%"
bind . command-prompt "move-window -t '%%'"

# =============================================================================
# Utilidades Adicionales
# =============================================================================

# Sincronizar paneles (toggle)
bind S setw synchronize-panes

# Intercambiar posición de paneles
bind x swap-pane -D

# Maximizar/minimizar paneles
bind m resize-pane -Z

# Mostrar información de paneles
bind i display-panes

# Limpiar historial del pane
bind K clear-history \; display "Historial limpio"

# =============================================================================
# Performance y Optimización
# =============================================================================

# Reducir delay de comandos (0 = sin lag para Claude Code)
set -s escape-time 0

# Historial por pane (10K líneas ≈ 1MB/pane, suficiente para sesiones largas)
set -g history-limit 10000

# Clipboard del sistema
set -g set-clipboard on

# Passthrough para escape sequences (on = solo panes visibles)
set -g allow-passthrough on

# Teclas extendidas (Ctrl+Shift combos para Claude Code)
set -g extended-keys on
set -g extended-keys-format csi-u

# Monitor de actividad (off para reducir redibujados)
setw -g monitor-activity off
set -g visual-activity off

# =============================================================================
# Atajos Anidados (para tmux dentro de tmux)
# =============================================================================

# Enviar prefix a sesión tmux anidada
bind a send-prefix

# =============================================================================
# Plugin Manager (TPM)
# =============================================================================

# Lista de plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'aomerk/tmux-claude-sessions'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'visible'
set -g @resurrect-strategy-nvim 'session'

# Continuum config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# FZF URL config
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Prefix highlight config
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#cba6f7'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e1e2e,bg=#f38ba8,bold'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=#1e1e2e,bg=#89dceb,bold'

# Floax config
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Sesh - smart session manager
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
    --header ' ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️ )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁 )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎 )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡ )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Sesh last - alternar entre 2 sesiones recientes
bind -N "last-session (sesh)" "'" run-shell "sesh last"

# Keep Prefix+G free (used by tmux-claude-sessions plugin)
unbind-key -T prefix G

# Inicializar TPM (DEBE ir al final)
run '~/.tmux/plugins/tpm/tpm'
